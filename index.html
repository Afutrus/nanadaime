<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enshrined | Fair Mint on Tempo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:italic,wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body {
            background-color: #0c0c0c;
            color: #e5e5e0;
            font-family: 'Inter', sans-serif;
        }
        .serif { font-family: 'Libre_Baskerville', serif; }
        .gold-glow { box-shadow: 0 0 50px rgba(212, 175, 55, 0.1); }
        .btn-gold { background-color: #e5e5e0; color: #000; transition: 0.3s; }
        .btn-gold:hover { background-color: #fff; transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="flex justify-between items-center px-8 py-6 max-w-6xl mx-auto">
        <div class="serif text-2xl italic tracking-widest text-[#d4af37]">enshrined</div>
        <div class="flex items-center gap-6">
            <a href="/skill.md" class="hidden md:block text-[10px] uppercase tracking-widest opacity-40 hover:opacity-100 transition">Agent Skill</a>
            <button id="connectBtn" class="border border-zinc-800 px-4 py-2 rounded-full text-[10px] uppercase tracking-widest hover:bg-zinc-900 transition">
                Connect Wallet
            </button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto pt-12 pb-20 px-4 text-center">
        <h1 class="serif text-6xl mb-4 italic tracking-tight">enshrined</h1>
        <p class="text-[10px] opacity-40 mb-12 tracking-[0.3em] uppercase">Fair mint. Fixed supply. On-chain on Tempo.</p>

        <div class="bg-[#111111] border border-white/5 rounded-[2.5rem] p-8 shadow-2xl gold-glow relative">
            <div class="grid grid-cols-2 gap-4 mb-6 text-left">
                <div class="bg-zinc-900/40 border-2 border-[#d4af37] p-6 rounded-2xl">
                    <p class="text-3xl font-bold">$1</p>
                    <p class="text-[9px] opacity-40 uppercase mt-1">720 ENSH</p>
                </div>
                <div class="bg-zinc-900/20 border border-white/5 p-6 rounded-2xl opacity-30">
                    <p class="text-3xl font-bold">$5</p>
                    <p class="text-[9px] opacity-40 uppercase mt-1">3,600 ENSH</p>
                </div>
            </div>

            <div class="bg-black/40 border border-white/5 rounded-2xl py-10 mb-8">
                <div class="flex justify-center items-center gap-6">
                    <span class="text-3xl font-light tracking-tight">1 pathUSD</span>
                    <span class="text-zinc-800 text-4xl">→</span>
                    <span class="text-3xl font-light tracking-tight">720 ENSH</span>
                </div>
                <p class="text-[8px] mt-4 opacity-20 tracking-[0.4em] uppercase font-bold">direct on-chain mint</p>
            </div>

            <button id="mintBtn" class="w-full btn-gold font-bold py-5 rounded-2xl uppercase tracking-[0.2em] text-[11px] mb-8 shadow-lg">
                Execute Transaction
            </button>

            <div class="grid grid-cols-4 gap-2 mb-8">
                <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                    <p class="text-[7px] opacity-30 uppercase mb-1">Price</p>
                    <p class="text-[11px] font-semibold">$1</p>
                </div>
                <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                    <p class="text-[7px] opacity-30 uppercase mb-1">Per Mint</p>
                    <p class="text-[11px] font-semibold">720</p>
                </div>
                <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                    <p class="text-[7px] opacity-30 uppercase mb-1">Mints</p>
                    <p class="text-[11px] font-semibold">8,871</p>
                </div>
                <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                    <p class="text-[7px] opacity-30 uppercase mb-1">Dist.</p>
                    <p class="text-[11px] font-semibold">37.3M</p>
                </div>
            </div>

            <div class="text-left">
                <div class="flex justify-between text-[9px] opacity-30 mb-3 uppercase tracking-widest">
                    <span>Remaining: 22,665,360 ENSH</span>
                    <span>62.2%</span>
                </div>
                <div class="h-[2px] w-full bg-zinc-900 rounded-full">
                    <div class="h-full bg-[#d4af37] w-[62%] shadow-[0_0_10px_#d4af37]"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let signer;
        const connectBtn = document.getElementById('connectBtn');
        const mintBtn = document.getElementById('mintBtn');

        // Fungsi Connect Wallet
        async function connect() {
            if (window.ethereum) {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = provider.getSigner();
                    const address = await signer.getAddress();
                    connectBtn.innerText = address.slice(0,6) + "..." + address.slice(-4);
                    connectBtn.classList.add('bg-[#d4af37]', 'text-black', 'border-none');
                } catch (error) {
                    console.error("User menolak koneksi");
                }
            } else {
                alert("Silakan install MetaMask!");
            }
        }

        // Fungsi Mint (Placeholder)
        async function mint() {
            if (!signer) {
                await connect();
                return;
            }
            alert("Transaksi dikirim ke jaringan Tempo... (Pastikan kontrak Anda benar)");
            // Di sini Anda bisa menambahkan contract.mint() jika ABI sudah siap
        }

        connectBtn.addEventListener('click', connect);
        mintBtn.addEventListener('click', mint);
    </script>
</body>
</html>
