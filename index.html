<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempoClaw | Fair Mint Tempo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:italic,wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0c0c0c; color: #e5e5e0; font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Libre Baskerville', serif; }
        .card-bg { background-color: #111111; border: 1px solid rgba(255,255,255,0.05); }
        .gold-glow { box-shadow: 0 0 40px rgba(212, 175, 55, 0.05); }
        .progress-bar { height: 2px; background: #1a1a1a; overflow: hidden; }
        .progress-fill { height: 100%; background: #d4af37; box-shadow: 0 0 10px #d4af37; transition: width 1s ease-in-out; }
        .pkg-active { border-color: #d4af37 !important; opacity: 1 !important; background: rgba(24, 24, 27, 0.8) !important; }
    </style>
</head>
<body class="min-h-screen antialiased">

    <nav class="max-w-6xl mx-auto px-8 py-8 flex justify-between items-center">
        <div class="serif text-2xl italic tracking-[0.2em] text-[#d4af37]">TempoClaw</div>
        <button id="connectBtn" class="bg-zinc-900 border border-zinc-800 px-5 py-2 rounded-full text-[10px] uppercase tracking-widest hover:bg-zinc-800 transition">
            Connect Wallet
        </button>
    </nav>

    <main class="max-w-xl mx-auto px-4 pt-10 pb-24 text-center">
        <h1 class="serif text-6xl mb-4 italic tracking-tight">TempoClaw</h1>
        <p class="text-[10px] opacity-40 mb-10 tracking-[0.3em] uppercase italic">1 pathUSD = 1,000 $TPC Max 50 per tx.</p>

        <div class="card-bg rounded-[2.5rem] p-8 gold-glow relative overflow-hidden">
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div id="pkg1" onclick="selectPkg(1, 'pkg1')" class="package-card pkg-active cursor-pointer bg-zinc-900/50 border-2 border-white/5 p-6 rounded-2xl text-left transition-all">
                    <p class="text-3xl font-bold text-white">$1</p>
                    <p class="text-[9px] opacity-40 uppercase mt-1 tracking-widest">1,000 TPC</p>
                </div>
                <div id="pkg5" onclick="selectPkg(5, 'pkg5')" class="package-card opacity-30 cursor-pointer bg-zinc-900/50 border-2 border-white/5 p-6 rounded-2xl text-left transition-all">
                    <p class="text-3xl font-bold text-white">$5</p>
                    <p class="text-[9px] opacity-40 uppercase mt-1 tracking-widest">5,000 TPC</p>
                </div>
            </div>

            <div class="mb-6">
                <input type="number" id="customAmount" placeholder="Or enter custom amount (Max 50)" 
                    class="w-full bg-black/40 border border-white/5 rounded-xl py-4 px-6 text-center outline-none focus:border-[#d4af37] transition text-sm"
                    oninput="handleCustomInput(this.value)">
            </div>

            <div class="bg-black/20 border border-white/5 rounded-2xl py-8 mb-8">
                <p class="text-[10px] opacity-30 uppercase mb-2 tracking-widest">You will pay</p>
                <div class="flex justify-center items-center gap-4">
                    <span id="displayUSD" class="text-3xl font-light">1</span>
                    <span class="text-zinc-700 text-2xl">pathUSD</span>
                </div>
            </div>

            <button id="mintBtn" class="w-full bg-[#e5e5e0] hover:bg-white text-black font-bold py-5 rounded-2xl uppercase tracking-[0.2em] text-[11px] mb-8 transition-all active:scale-[0.98]">
                Execute Mint
            </button>

            <div class="grid grid-cols-4 gap-2 mb-10 text-[10px]">
                <div class="border border-white/5 p-3 rounded-xl">
                    <p class="opacity-30 uppercase mb-1">Price</p>
                    <p class="font-medium text-white">$1</p>
                </div>
                <div class="border border-white/5 p-3 rounded-xl">
                    <p class="opacity-30 uppercase mb-1">Tokens/USD</p>
                    <p class="font-medium text-white">1,000</p>
                </div>
                <div class="border border-white/5 p-3 rounded-xl">
                    <p class="opacity-30 uppercase mb-1">Minted</p>
                    <p id="totalDistributed" class="font-medium text-white">Loading...</p>
                </div>
                <div class="border border-white/5 p-3 rounded-xl">
                    <p class="opacity-30 uppercase mb-1">Total Cap</p>
                    <p class="font-medium text-white">60M</p>
                </div>
            </div>

            <div class="text-left">
                <div class="flex justify-between text-[9px] opacity-40 mb-3 uppercase tracking-widest">
                    <span id="remainingText">Remaining: Loading...</span>
                    <span id="progressPercent" class="text-[#d4af37]">0%</span>
                </div>
                <div class="progress-bar rounded-full">
                    <div id="progressBar" class="progress-fill" style="width: 0%;"></div>
                </div>
            </div>
        </div>

        <div id="status" class="mt-6 text-[10px] opacity-30 uppercase tracking-widest leading-loose">
            Connect wallet on Network Tempo to proceed
        </div>
    </main>

    <script>
        const CONFIG = {
            chainId: '0x1079', // 4217
            rpc: 'https://tempo-mainnet.drpc.org',
            enshAddr: '0x2CCD6B991ba3e29fC890eaAaf2326ea0d8AfdC70',
            pathAddr: '0x20c0000000000000000000000000000000000000',
            abi: [
                "function mint(uint256 amountInUSD) external",
                "function approve(address spender, uint256 amount) external returns (bool)",
                "function totalMinted() external view returns (uint256)" // Fungsi untuk baca data
            ],
            mintCap: 60000000 // 60 Juta
        };

        let signer = null;
        let currentAmount = 1;

        // Elements
        const connectBtn = document.getElementById('connectBtn');
        const mintBtn = document.getElementById('mintBtn');
        const statusText = document.getElementById('status');
        const displayUSD = document.getElementById('displayUSD');
        const totalDistributedEl = document.getElementById('totalDistributed');
        const remainingTextEl = document.getElementById('remainingText');
        const progressPercentEl = document.getElementById('progressPercent');
        const progressBarEl = document.getElementById('progressBar');

        // Logic Update Stats dari Blockchain
        async function updateLiveStats() {
            try {
                const readProvider = new ethers.JsonRpcProvider(CONFIG.rpc);
                const contract = new ethers.Contract(CONFIG.enshAddr, CONFIG.abi, readProvider);
                
                // Ambil totalMinted dari kontrak
                const rawMinted = await contract.totalMinted();
                const minted = Number(ethers.formatEther(rawMinted));
                
                const remaining = CONFIG.mintCap - minted;
                const percent = (minted / CONFIG.mintCap) * 100;

                // Update UI
                totalDistributedEl.innerText = (minted / 1000000).toFixed(2) + "M";
                remainingTextEl.innerText = "Remaining: " + remaining.toLocaleString() + " ENSH";
                progressPercentEl.innerText = percent.toFixed(2) + "% Minted";
                progressBarEl.style.width = percent.toFixed(2) + "%";
            } catch (err) {
                console.error("Gagal update stats:", err);
            }
        }

        // Jalankan update saat halaman dibuka
        updateLiveStats();
        // Update otomatis setiap 30 detik
        setInterval(updateLiveStats, 30000);

        function selectPkg(num, id) {
            currentAmount = num;
            document.querySelectorAll('.package-card').forEach(el => el.classList.remove('pkg-active'));
            document.getElementById(id).classList.add('pkg-active');
            document.getElementById('customAmount').value = '';
            displayUSD.innerText = currentAmount;
        }

        function handleCustomInput(val) {
            let num = parseInt(val) || 0;
            if (num > 50) num = 50;
            currentAmount = num;
            displayUSD.innerText = currentAmount;
            document.querySelectorAll('.package-card').forEach(el => el.classList.remove('pkg-active'));
        }

        async function connect() {
            if (!window.ethereum) return alert("Install MetaMask");
            const provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            
            const network = await provider.getNetwork();
            if (Number(network.chainId) !== 4217) {
                try {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: CONFIG.chainId,
                            chainName: 'Tempo Mainnet',
                            nativeCurrency: { name: 'pathUSD', symbol: 'pathUSD', decimals: 18 },
                            rpcUrls: [CONFIG.rpc],
                            blockExplorerUrls: ['https://explore.tempo.xyz/']
                        }]
                    });
                } catch (e) { alert("Please switch to Network 4217 manualy"); }
            }
            connectBtn.innerText = accounts[0].slice(0,6)+"..."+accounts[0].slice(-4);
            statusText.innerText = "Ready to mint on Chain 4217";
        }

        async function mint() {
            if (!signer) return connect();
            if (currentAmount <= 0) return alert("Enter amount");

            try {
                mintBtn.disabled = true;
                mintBtn.innerText = "Approving pathUSD...";
                
                const amountWei = ethers.parseUnits(currentAmount.toString(), 18);
                const pathContract = new ethers.Contract(CONFIG.pathAddr, CONFIG.abi, signer);
                const appTx = await pathContract.approve(CONFIG.enshAddr, amountWei);
                await appTx.wait();
                
                mintBtn.innerText = "Executing Mint...";
                const enshContract = new ethers.Contract(CONFIG.enshAddr, CONFIG.abi, signer);
                const mintTx = await enshContract.mint(amountWei);
                statusText.innerText = "Waiting for confirmation...";
                await mintTx.wait();

                alert("Successfully minted " + (currentAmount * 1000) + " ENSH!");
                statusText.innerText = "Success!";
                updateLiveStats(); // Update stats setelah mint berhasil
            } catch (err) {
                console.error(err);
                alert("Error: " + (err.reason || "Transaction rejected"));
            } finally {
                mintBtn.disabled = false;
                mintBtn.innerText = "Execute Mint";
            }
        }

        connectBtn.addEventListener('click', connect);
        mintBtn.addEventListener('click', mint);
    </script>
</body>
</html>
