<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enshrined | Fair Mint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:italic,wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0c0c0c; color: #e5e5e0; font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Libre Baskerville', serif; }
        .card-bg { background-color: #111111; border: 1px solid rgba(255,255,255,0.05); }
        .gold-glow { box-shadow: 0 0 40px rgba(212, 175, 55, 0.05); }
        .progress-bar { height: 2px; background: #1a1a1a; overflow: hidden; }
        .progress-fill { height: 100%; background: #d4af37; box-shadow: 0 0 10px #d4af37; transition: width 1s ease-in-out; }
    </style>
</head>
<body class="min-h-screen antialiased">

    <nav class="max-w-6xl mx-auto px-8 py-8 flex justify-between items-center">
        <div class="serif text-2xl italic tracking-[0.2em] text-[#d4af37]">enshrined</div>
        <div class="flex items-center gap-6">
            <a href="skill.md" class="text-[10px] uppercase tracking-widest opacity-40 hover:opacity-100 transition">skill.md</a>
            <button id="connectBtn" class="bg-zinc-900 border border-zinc-800 px-5 py-2 rounded-full text-[10px] uppercase tracking-widest hover:bg-zinc-800 transition">
                Connect Wallet
            </button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-4 pt-16 pb-24 text-center">
        <h1 class="serif text-6xl mb-4 italic tracking-tight">enshrined</h1>
        <p class="text-[10px] opacity-40 mb-14 tracking-[0.3em] uppercase italic">Fair mint. Fixed supply. On-chain on Tempo.</p>

        <div class="card-bg rounded-[2.5rem] p-8 gold-glow relative overflow-hidden">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-zinc-900/50 border-2 border-[#d4af37] p-6 rounded-2xl text-left">
                    <p class="text-3xl font-bold text-white">$1</p>
                    <p class="text-[9px] opacity-40 uppercase mt-1 tracking-widest">$1 → 720 ENSH</p>
                </div>
                <div class="bg-zinc-900/20 border border-white/5 p-6 rounded-2xl text-left opacity-30">
                    <p class="text-3xl font-bold text-white">$5</p>
                    <p class="text-[9px] opacity-40 uppercase mt-1 tracking-widest">$5 → 3,600 ENSH</p>
                </div>
            </div>

            <div class="bg-black/40 border border-white/5 rounded-2xl py-12 mb-8">
                <div class="flex justify-center items-center gap-6">
                    <span class="text-3xl font-light">1 pathUSD</span>
                    <span class="text-zinc-800 text-4xl">→</span>
                    <span class="text-3xl font-light">720 ENSH</span>
                </div>
                <p class="text-[8px] mt-4 opacity-20 tracking-[0.4em] uppercase font-bold">direct on-chain mint</p>
            </div>

            <button id="mintBtn" class="w-full bg-[#e5e5e0] hover:bg-white text-black font-bold py-5 rounded-2xl uppercase tracking-[0.2em] text-[11px] mb-8 transition-all active:scale-[0.98] shadow-lg">
                Execute Mint
            </button>

            <div class="grid grid-cols-4 gap-2 mb-10">
                <div class="border border-white/5 p-3 rounded-xl">
                    <p class="text-[7px] opacity-30 uppercase mb-1">Price</p>
                    <p class="text-xs font-medium text-white">$1</p>
                </div>
                <div class="border border-white/5 p-3 rounded-xl">
                    <p class="text-[7px] opacity-30 uppercase mb-1">Per Mint</p>
                    <p class="text-xs font-medium text-white">720</p>
                </div>
                <div class="border border-white/5 p-3 rounded-xl">
                    <p class="text-[7px] opacity-30 uppercase mb-1">Total Mints</p>
                    <p id="totalMints" class="text-xs font-medium text-white">10,404</p>
                </div>
                <div class="border border-white/5 p-3 rounded-xl">
                    <p class="text-[7px] opacity-30 uppercase mb-1">Distributed</p>
                    <p id="distributed" class="text-xs font-medium text-white">41.4M</p>
                </div>
            </div>

            <div class="text-left">
                <div class="flex justify-between text-[9px] opacity-40 mb-3 uppercase tracking-[0.1em]">
                    <span>Remaining: 18,589,440 ENSH</span>
                    <span class="text-[#d4af37]">69.0%</span>
                </div>
                <div class="progress-bar rounded-full">
                    <div class="progress-fill" style="width: 69%;"></div>
                </div>
            </div>
        </div>

        <div id="status" class="mt-6 text-[10px] opacity-30 uppercase tracking-widest">Connect wallet to start</div>
    </main>

    <script>
        // CONFIGURATION
        const CONFIG = {
            chainId: '0x1079', // 1000001
            chainName: 'Tempo Mainnet',
            rpc: 'https://tempo-mainnet.drpc.org',
            enshAddress: '0x07f8...2C02', // Masukkan alamat kontrak ENSH Anda
            pathUSDAddress: '0x...',       // Masukkan alamat pathUSD Anda
            abi: ["function mint(uint256 amount) external"]
        };

        let signer = null;
        let provider = null;

        const connectBtn = document.getElementById('connectBtn');
        const mintBtn = document.getElementById('mintBtn');
        const statusText = document.getElementById('status');

        async function updateUI(address) {
            connectBtn.innerText = address.slice(0,6) + "..." + address.slice(-4);
            connectBtn.classList.replace('bg-zinc-900', 'bg-[#d4af37]');
            connectBtn.classList.replace('text-white', 'text-black');
            statusText.innerText = "Wallet: " + address + " | Network: Tempo";
        }

        async function connect() {
            if (!window.ethereum) return alert("Please install MetaMask!");
            
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                
                // Check Network
                const network = await provider.getNetwork();
                if (network.chainId !== BigInt(4217)) {
                    statusText.innerText = "Switching to Tempo...";
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: CONFIG.chainId,
                            chainName: CONFIG.chainName,
                            nativeCurrency: { name: 'Tempo', symbol: 'pathUSD', decimals: 18 },
                            rpcUrls: [CONFIG.rpc],
                            blockExplorerUrls: ['https://explore.tempo.xyz/']
                        }]
                    });
                }
                
                updateUI(accounts[0]);
            } catch (err) {
                console.error(err);
                statusText.innerText = "Connection failed";
            }
        }

        async function mint() {
            if (!signer) return connect();
            
            try {
                mintBtn.innerText = "Processing...";
                mintBtn.disabled = true;

                const contract = new ethers.Contract(CONFIG.enshAddress, CONFIG.abi, signer);
                
                // 1 pathUSD = 10^18 (Standard 18 decimals)
                const amount = ethers.parseEther("1.0");
                
                const tx = await contract.mint(amount);
                statusText.innerText = "Transaction Sent! Waiting for block...";
                
                await tx.wait();
                statusText.innerText = "Mint Successful!";
                alert("Mint Successful!");
            } catch (err) {
                console.error(err);
                alert("Error: " + (err.reason || err.message));
                statusText.innerText = "Transaction failed";
            } finally {
                mintBtn.innerText = "Execute Mint";
                mintBtn.disabled = false;
            }
        }

        connectBtn.addEventListener('click', connect);
        mintBtn.addEventListener('click', mint);
    </script>
</body>
</html>
