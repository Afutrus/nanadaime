<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempoClaw | Neural Command Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Outfit:wght@200;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-blue: #00f2ff; --deep-bg: #030303; }
        body { 
            background-color: var(--deep-bg); 
            color: #ffffff; 
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-font { font-family: 'Space Grotesk', sans-serif; }

        /* Background Animation */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #0044ff15 0%, transparent 70%);
            z-index: -1;
        }

        /* Glitch Effect */
        .glitch {
            position: relative;
            font-size: 5rem;
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                         -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                         0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em -0.05em 0 rgba(0, 0, 255, 0.75); }
        }

        .countdown-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 1.5rem;
            border-radius: 1rem;
            min-width: 80px;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <main class="text-center px-4 relative z-10">
        <div class="w-20 h-20 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-2xl mx-auto mb-8 shadow-[0_0_30px_rgba(0,242,255,0.4)] flex items-center justify-center">
            <span class="header-font text-3xl font-bold text-black italic">T</span>
        </div>

        <p class="header-font text-cyan-400 tracking-[0.5em] text-xs uppercase mb-4 font-bold">Protocol Initialization</p>
        
        <h1 class="header-font text-4xl md:text-7xl font-bold mb-6 tracking-tighter italic">
            TEMPOCLAW <span class="text-white/20">AI</span>
        </h1>

        <p class="text-white/40 max-w-md mx-auto mb-12 text-sm md:text-base font-light italic leading-relaxed">
            Autonomous predator logic is currently synchronizing with Tempo Mainnet. 
            The neural command center will be online shortly.
        </p>

        <div class="flex justify-center gap-4 mb-12">
            <div class="countdown-box">
                <span id="days" class="header-font text-3xl font-bold block text-cyan-400">00</span>
                <span class="text-[10px] uppercase opacity-40 tracking-widest">Days</span>
            </div>
            <div class="countdown-box">
                <span id="hours" class="header-font text-3xl font-bold block">00</span>
                <span class="text-[10px] uppercase opacity-40 tracking-widest">Hrs</span>
            </div>
            <div class="countdown-box">
                <span id="minutes" class="header-font text-3xl font-bold block text-cyan-400">00</span>
                <span class="text-[10px] uppercase opacity-40 tracking-widest">Min</span>
            </div>
        </div>

        <button onclick="window.open('https://t.me/TempoClawXyz_bot', '_blank')" 
                class="bg-white text-black px-8 py-4 rounded-full font-bold uppercase text-[10px] tracking-[0.2em] hover:bg-cyan-400 transition-all duration-300 shadow-[0_10px_30px_rgba(255,255,255,0.1)]">
            Join Early Access Bot
        </button>

        <div class="mt-20 opacity-20 text-[10px] tracking-[0.4em] uppercase">
            Tempo-4217 System Standby
        </div>
    </main>

    <script>
        // Set Countdown Date (Contoh: 7 hari dari sekarang)
        const countdownDate = new Date().getTime() + (7 * 24 * 60 * 60 * 1000);

        const updateCountdown = setInterval(function() {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById("days").innerHTML = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;

            if (distance < 0) {
                clearInterval(updateCountdown);
                document.body.innerHTML = "<h1>INITIALIZING...</h1>";
                location.reload();
            }
        }, 1000);
    </script>
</body>
</html>
