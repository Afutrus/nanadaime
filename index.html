<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempoClaw | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Outfit:wght@200;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-blue: #00f2ff; --deep-bg: #030303; }
        body { 
            background-color: var(--deep-bg); 
            color: #ffffff; 
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-font { font-family: 'Space Grotesk', sans-serif; }

        /* Background Animation */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #0044ff15 0%, transparent 70%);
            z-index: -1;
        }

        /* Glitch Effect */
        .glitch {
            position: relative;
            font-size: 5rem;
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                         -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                         0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em -0.05em 0 rgba(0, 0, 255, 0.75); }
        }

        .countdown-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 1.5rem;
            border-radius: 1rem;
            min-width: 100px;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <nav class="absolute top-0 left-0 w-full p-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(0,242,255,0.3)] overflow-hidden">
                <img src="logo.png" alt="TPC" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150/00f2ff/000000?text=T'">
            </div>
            <span class="header-font text-xl font-bold tracking-tighter uppercase text-white">TempoClaw</span>
        </div>
    </nav>

    <main class="text-center px-4 relative z-10 pt-20">
        <p class="header-font text-cyan-400 tracking-[0.5em] text-xs uppercase mb-4 font-bold">Neural Command Syncing</p>
        
        <h1 class="header-font text-4xl md:text-7xl font-bold mb-6 tracking-tighter italic text-white glitch">
            SYSTEM STARTUP
        </h1>

        <p class="text-white/40 max-w-sm mx-auto mb-12 text-sm md:text-base font-light italic leading-relaxed">
            Predator AI logic is initializing connection to Tempo Mainnet. Core systems will be operational shortly.
        </p>

        <div class="flex justify-center gap-4 mb-12">
            <div class="countdown-box">
                <span id="hours" class="header-font text-3xl md:text-5xl font-bold block text-white/40">01</span>
                <span class="text-[10px] md:text-[12px] uppercase opacity-40 tracking-widest text-white">Hours</span>
            </div>
            <div class="countdown-box">
                <span id="minutes" class="header-font text-3xl md:text-5xl font-bold block text-cyan-400">00</span>
                <span class="text-[10px] md:text-[12px] uppercase opacity-40 tracking-widest text-white">Minutes</span>
            </div>
            <div class="countdown-box">
                <span id="seconds" class="header-font text-3xl md:text-5xl font-bold block text-white">00</span>
                <span class="text-[10px] md:text-[12px] uppercase opacity-40 tracking-widest text-white">Seconds</span>
            </div>
        </div>

        <button onclick="window.open('https://t.me/TempoClawXyz_bot', '_blank')" 
                class="bg-white text-black px-10 py-5 rounded-full font-bold uppercase text-[10px] tracking-[0.2em] hover:bg-cyan-400 transition-all duration-300 shadow-[0_10px_40px_rgba(255,255,255,0.1)] active:scale-95">
            Join Early Access Bot
        </button>

        <div class="mt-20 opacity-20 text-[10px] tracking-[0.4em] uppercase text-white">
            Tempo Mainnet
        </div>
    </main>

    <script>
        // Set Countdown Date (Tepat 1 jam dari sekarang)
        const countdownDate = new Date().getTime() + (1 * 60 * 60 * 1000);

        const updateCountdown = setInterval(function() {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            // Hitung Jam, Menit, Detik
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Tampilkan dengan format 00
            document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;

            // Jika hitungan mundur selesai
            if (distance < 0) {
                clearInterval(updateCountdown);
                // Ubah tampilan menjadi INITIALIZING
                document.body.innerHTML = '<div class="absolute inset-0 flex items-center justify-center bg-black text-cyan-400 header-font text-4xl font-bold animate-pulse">INITIALIZING CORE SYSTEM...</div>';
                
                // Opsional: Reload untuk memuat halaman asli (index.html)
                // setTimeout(() => { location.reload(); }, 3000);
            }
        }, 1000);
    </script>
</body>
</html>
