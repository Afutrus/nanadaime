<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempoClaw | Cooming soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Outfit:wght@200;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-blue: #00f2ff; --deep-bg: #030303; }
        body { 
            background-color: var(--deep-bg); 
            color: #ffffff; 
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-font { font-family: 'Space Grotesk', sans-serif; }

        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #0044ff10 0%, transparent 70%);
            z-index: -1;
        }

        .shimmer {
            animation: shimmer-effect 2s infinite linear;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.1), transparent);
            background-size: 200% 100%;
        }

        @keyframes shimmer-effect {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .pulse-text {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .3; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <main class="text-center px-4 relative z-10">
        <div class="w-24 h-24 bg-gradient-to-br from-cyan-400/20 to-blue-600/20 rounded-2xl mx-auto mb-10 flex items-center justify-center border border-cyan-400/30 shadow-[0_0_40px_rgba(0,242,255,0.1)] overflow-hidden">
            <img src="logo.png" alt="TPC" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150/00f2ff/000000?text=T'">
        </div>

        <p class="header-font text-cyan-400 tracking-[0.6em] text-[10px] uppercase mb-6 font-bold pulse-text">
            Neural Command Syncing
        </p>
        
        <h1 class="header-font text-5xl md:text-7xl font-bold mb-6 tracking-tighter italic text-white">
            TEMPOCLAW <span class="text-white/10 italic">XYZ</span>
        </h1>

        <div class="max-w-xs mx-auto">
            <div class="h-[1px] w-full bg-white/10 mb-6 shimmer"></div>
            <p class="text-white/30 text-[11px] uppercase tracking-[0.3em] font-light leading-relaxed">
                Autonomous predator logic is initializing. System status: <span class="text-cyan-400/50">Standby</span>.
            </p>
        </div>

        <div class="mt-32 opacity-10 text-[9px] tracking-[0.5em] uppercase text-white font-bold">
            Protocol Tempo
        </div>
    </main>

    <script>
        // Mencegah klik kanan sederhana
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
